schema: xgc2.product.v1
id: xgc2-scout-msgs
name: XGC2 Scout Messages
kind: ros1-apt
summary: ROS Melodic and Noetic AgileX Scout message definitions kept compatible with
  the recovered vehicle driver.
version: 0.3.3-8
ros:
  distro: melodic,noetic
  packages:
  - scout_msgs
apt:
  distribution: bionic,focal
  install:
  - ros-melodic-scout-msgs
  - ros-noetic-scout-msgs
  package_distributions:
    ros-melodic-scout-msgs:
    - bionic
    ros-noetic-scout-msgs:
    - focal
  packages:
  - ros-melodic-scout-msgs
  - ros-noetic-scout-msgs
  depends:
  - ros-melodic-message-runtime
  - ros-melodic-std-msgs
  - ros-noetic-message-runtime
  - ros-noetic-std-msgs
usage:
  install: 'sudo apt update

    sudo apt install ros-melodic-scout-msgs

    sudo apt install ros-noetic-scout-msgs

    '
  smoke_test: 'rospack find scout_msgs

    rosmsg show scout_msgs/ScoutStatus

    '
ownership:
  paths:
  - /opt/ros/melodic/share/scout_msgs
  - /opt/ros/melodic/include/scout_msgs
  - /opt/ros/noetic/share/scout_msgs
  - /opt/ros/noetic/include/scout_msgs
release:
  workflow: release.yml
  apt_versions:
    bionic: 0.3.3-8
    focal: 0.3.3-8
