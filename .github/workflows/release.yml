name: release

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Product version expected by the release orchestrator
        required: true
        type: string
      expected_source_sha:
        description: Source commit SHA expected by the release orchestrator
        required: true
        type: string
      publish_apt:
        description: Publish built debs to the XGC2 APT repository
        required: true
        default: false
        type: boolean
      run_cpp_quality:
        description: Run optional C++ quality checks before release
        required: true
        default: false
        type: boolean
      run_source_tests:
        description: Run optional source tests before release
        required: true
        default: false
        type: boolean
      release_id:
        description: Parent orchestrator run id used for correlation and audit
        required: false
        default: ""
        type: string
      release_lock_digest:
        description: SHA256 of the immutable release lock
        required: false
        default: ""
        type: string
      trusted_ci_run_id:
        description: Exact successful push CI run whose trusted deb artifacts may be reused
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate-release-inputs:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.product.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate expected version and source SHA
        id: product
        run: |
          set -euo pipefail
          version="$(awk -F': *' '/^version:[[:space:]]*/ {print $2; exit}' .xgc2/product.yml)"
          test -n "${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          test "${version}" = "${{ inputs.expected_version }}"
          test "$(git rev-parse HEAD)" = "${{ inputs.expected_source_sha }}"

  release-checks:
    needs: validate-release-inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run release checks
        run: |
          set -euo pipefail
          git diff --check HEAD
          .xgc2/scripts/check_package_compliance.sh

  cpp-quality:
    if: ${{ inputs.run_cpp_quality }}
    needs: release-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run lightweight C++ quality checks
        run: git diff --check HEAD

  source-tests:
    if: ${{ inputs.run_source_tests }}
    needs: release-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run source package checks
        run: .xgc2/scripts/check_package_compliance.sh

  build-debs:
    needs:
      - validate-release-inputs
      - release-checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: melodic
            image: ros:melodic-ros-base-bionic
            apt_distribution: bionic
            arch: amd64
            runner: ubuntu-latest
          - ros_distro: melodic
            image: ros:melodic-ros-base-bionic
            apt_distribution: bionic
            arch: arm64
            runner: ubuntu-24.04-arm
          - ros_distro: noetic
            image: ros:noetic-ros-base-focal
            apt_distribution: focal
            arch: amd64
            runner: ubuntu-latest
          - ros_distro: noetic
            image: ros:noetic-ros-base-focal
            apt_distribution: focal
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Download trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.trusted_ci_run_id }}
          name: xgc2-scout-msgs-debs-${{ matrix.ros_distro }}-${{ matrix.arch }}
          path: trusted

      - name: Verify and stage trusted CI artifacts
        if: ${{ inputs.trusted_ci_run_id != '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir trusted \
            --deb-output-dir debs \
            --manifest-output-dir build-manifests \
            --product xgc2-scout-msgs \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.apt_distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "${{ inputs.trusted_ci_run_id }}"

      - name: Build and install-check deb package
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --ros-distro "${{ matrix.ros_distro }}" \
            --image "${{ matrix.image }}" \
            --work-dir "$RUNNER_TEMP/xgc2-scout-msgs-release-${{ matrix.ros_distro }}-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create fallback build manifest
        if: ${{ inputs.trusted_ci_run_id == '' }}
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir build-manifests \
            --product xgc2-scout-msgs \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.apt_distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-scout-msgs-release-debs-${{ matrix.ros_distro }}-${{ matrix.arch }}
          path: |
            debs/*.deb
            build-manifests/*.json
          retention-days: 14
          include-hidden-files: true

  publish-apt:
    if: >-
      ${{
        always() &&
        inputs.publish_apt &&
        needs.validate-release-inputs.result == 'success' &&
        needs.release-checks.result == 'success' &&
        (needs.cpp-quality.result == 'success' || needs.cpp-quality.result == 'skipped') &&
        (needs.source-tests.result == 'success' || needs.source-tests.result == 'skipped') &&
        needs.build-debs.result == 'success'
      }}
    needs:
      - validate-release-inputs
      - release-checks
      - cpp-quality
      - source-tests
      - build-debs
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: melodic
            apt_distribution: bionic
          - ros_distro: noetic
            apt_distribution: focal
    runs-on: ubuntu-latest
    concurrency:
      group: xgc2-apt-${{ matrix.apt_distribution }}
      cancel-in-progress: false
    env:
      APT_REPO_HOST: ${{ secrets.APT_REPO_HOST }}
      APT_REPO_PORT: ${{ secrets.APT_REPO_PORT }}
      APT_REPO_DISTRIBUTION: ${{ matrix.apt_distribution }}
      APT_REPO_SSH_KEY: ${{ secrets.APT_REPO_SSH_KEY }}
      APT_REPO_KNOWN_HOSTS: ${{ secrets.APT_REPO_KNOWN_HOSTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: xgc2-scout-msgs-release-debs-${{ matrix.ros_distro }}-*
          path: release-input
          merge-multiple: true

      - name: Validate artifacts and create release manifests
        run: |
          python3 .xgc2/scripts/xgc2_artifact_manifest.py verify-build \
            --artifact-dir release-input \
            --deb-output-dir staged/debs \
            --manifest-output-dir staged/build-manifests \
            --product xgc2-scout-msgs \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.apt_distribution }}" \
            --source-sha "${{ inputs.expected_source_sha }}"
          python3 .xgc2/scripts/xgc2_artifact_manifest.py release \
            --deb-dir staged/debs \
            --build-manifest-dir staged/build-manifests \
            --publish-dir publish \
            --product xgc2-scout-msgs \
            --product-version "${{ inputs.expected_version }}" \
            --distribution "${{ matrix.apt_distribution }}" \
            --source-sha "${{ inputs.expected_source_sha }}" \
            --release-id "${{ inputs.release_id || github.run_id }}" \
            --release-lock-digest "${{ inputs.release_lock_digest }}" \
            --target-architecture amd64 \
            --target-architecture arm64

      - name: Publish to self-hosted APT repository
        run: |
          set -euo pipefail
          test -n "${APT_REPO_HOST}"
          test -n "${APT_REPO_SSH_KEY}"
          test -n "${APT_REPO_KNOWN_HOSTS}"
          export APT_REPO_PORT="${APT_REPO_PORT:-22}"
          .xgc2/scripts/publish_apt_repo.sh --deb-dir publish
