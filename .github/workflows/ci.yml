name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run metadata checks
        run: |
          set -euo pipefail
          git diff --check HEAD
          .xgc2/scripts/check_package_compliance.sh

  build-debs:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: melodic
            image: ros:melodic-ros-base-bionic
            apt_distribution: bionic
            arch: amd64
            runner: ubuntu-latest
          - ros_distro: melodic
            image: ros:melodic-ros-base-bionic
            apt_distribution: bionic
            arch: arm64
            runner: ubuntu-24.04-arm
          - ros_distro: noetic
            image: ros:noetic-ros-base-focal
            apt_distribution: focal
            arch: amd64
            runner: ubuntu-latest
          - ros_distro: noetic
            image: ros:noetic-ros-base-focal
            apt_distribution: focal
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build and install-check deb package
        run: |
          .xgc2/scripts/build_debs_in_docker.sh \
            --ros-distro "${{ matrix.ros_distro }}" \
            --image "${{ matrix.image }}" \
            --work-dir "$RUNNER_TEMP/xgc2-scout-msgs-${{ matrix.ros_distro }}-${{ matrix.arch }}" \
            --output-dir "$GITHUB_WORKSPACE/debs"

      - name: Create trusted build manifest
        run: |
          product_version="$(awk -F': *' '/^version:/ {print $2; exit}' .xgc2/product.yml)"
          python3 .xgc2/scripts/xgc2_artifact_manifest.py build \
            --deb-dir debs \
            --output-dir build-manifests \
            --product xgc2-scout-msgs \
            --product-version "$product_version" \
            --distribution "${{ matrix.apt_distribution }}" \
            --architecture "${{ matrix.arch }}" \
            --source-sha "$GITHUB_SHA" \
            --ci-run-id "$GITHUB_RUN_ID" \
            --ci-workflow "$GITHUB_WORKFLOW" \
            --ci-workflow-ref "$GITHUB_WORKFLOW_REF"

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xgc2-scout-msgs-debs-${{ matrix.ros_distro }}-${{ matrix.arch }}
          path: |
            debs/*.deb
            build-manifests/*.json
          retention-days: 14
          include-hidden-files: true
